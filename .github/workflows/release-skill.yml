name: Release Skill

on:
  push:
    branches: [main]
    paths:
      - 'transcription-speech-to-text-hebrew/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Package skill
        run: |
          cd transcription-speech-to-text-hebrew
          zip -r ../transcription-speech-to-text-hebrew.skill . \
            --exclude "*.pyc" \
            --exclude "*/__pycache__/*" \
            --exclude "*/.DS_Store"

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest transcription-speech-to-text-hebrew.skill \
            --title "Latest Skills" \
            --notes "Auto-updated on every push to main." \
            --latest
